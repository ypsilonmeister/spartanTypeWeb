<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Dark glass background gradient -->
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="60%" stop-color="#111116"/>
      <stop offset="100%" stop-color="#0a0a0e"/>
    </radialGradient>

    <!-- Neon cyan -> green keycap face -->
    <linearGradient id="cap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="55%" stop-color="#00adb5"/>
      <stop offset="100%" stop-color="#007a82"/>
    </linearGradient>

    <!-- Keycap side (darker, gives 3D extrusion) -->
    <linearGradient id="side" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#018b91"/>
      <stop offset="100%" stop-color="#004b50"/>
    </linearGradient>

    <!-- Outer neon ring -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="50%" stop-color="#00adb5"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- Rounded-square app background -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#00adb5" stroke-opacity="0.25" stroke-width="3"/>

  <!-- Neon analysis ring (cyan->magenta), broken arc for a "scan/HUD" feel -->
  <g filter="url(#glow)">
    <path d="M 256 86
             A 170 170 0 1 1 116 342"
          fill="none" stroke="url(#ring)" stroke-width="18" stroke-linecap="round"/>
  </g>
  <!-- Small magenta scan node on the ring -->
  <circle cx="116" cy="342" r="15" fill="#ff007f" filter="url(#glow)"/>

  <!-- Soft glow pad behind keycap -->
  <ellipse cx="256" cy="266" rx="125" ry="108" fill="#00ffcc" opacity="0.16" filter="url(#softGlow)"/>

  <!-- Keycap: extruded body (side) -->
  <rect x="156" y="178" width="200" height="180" rx="38" fill="url(#side)"/>
  <!-- Keycap: top face -->
  <rect x="156" y="160" width="200" height="180" rx="38" fill="url(#cap)"/>
  <!-- Top-face inner bevel highlight -->
  <rect x="176" y="180" width="160" height="140" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="3"/>

  <!-- Spartan "S" glyph carved on the keycap (vector path, font-independent) -->
  <path d="M 312 214
           q -26 -20 -60 -20
           q -40 0 -64 22
           q -24 22 -24 53
           q 0 29 19 46
           q 19 17 57 26
           l 21 6
           q 21 6 30 13
           q 9 7 9 19
           q 0 15 -12 23
           q -12 8 -33 8
           q -36 0 -64 -27
           l 0 54
           q 28 19 66 19
           q 43 0 68 -23
           q 25 -23 25 -56
           q 0 -30 -19 -48
           q -19 -18 -57 -27
           l -21 -6
           q -19 -5 -27 -12
           q -8 -7 -8 -18
           q 0 -13 11 -20
           q 11 -7 31 -7
           q 32 0 57 23
           z"
        fill="#04282d"/>
</svg>
